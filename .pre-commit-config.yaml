fail_fast: true
default_install_hook_types: [pre-commit, commit-msg]
repos:
  # Built-in fast hooks (Rust-native, no Python, no network)
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]

      - id: end-of-file-fixer
        stages: [pre-commit]

      - id: check-yaml
        stages: [pre-commit]

      - id: check-toml
        files: ^src-tauri/
        stages: [pre-commit]

      - id: check-json
        exclude: 'tsconfig.*\.json$'
        stages: [pre-commit]

      - id: check-added-large-files
        stages: [pre-commit]

      - id: detect-private-key
        stages: [pre-commit]

  # Rust (src-tauri)
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path=src-tauri/Cargo.toml --
        language: system
        pass_filenames: false
        files: ^src-tauri/
        stages: [pre-commit]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path=src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
        language: system
        pass_filenames: false
        files: ^src-tauri/
        stages: [pre-commit]

  # Frontend (staged files only)
  - repo: local
    hooks:
      - id: lint-staged
        name: lint-staged
        entry: bunx lint-staged --quiet --config lint-staged.config.js
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: commitlint
        name: commitlint
        entry: bunx commitlint --edit
        language: system
        pass_filenames: true
        stages: [commit-msg]
